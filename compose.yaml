name: figmark

# Single-host / air-gapped deployment of the figmark service, running the
# published image from GHCR — no source checkout needed.
# Secrets come from files (Docker secrets), never plaintext env. Your
# config.yaml (where api.base_url points at your LLM endpoint) is mounted
# read-only.
#
# Connected host:
#   1. cp config.example.yaml config.yaml   # then edit api.base_url + api.model
#   2. mkdir -p secrets
#      printf '%s' '<token>'   > ./secrets/auth_token
#      printf '%s' '<llm-key>' > ./secrets/figmark_api_key
#   3. docker compose up -d                  # pulls ghcr.io/ztein/figmark:edge
#
# Air-gapped host (release bundle):
#   1. docker load < figmark-<ver>.tar.gz
#   2. steps as above, then: FIGMARK_VERSION=<ver> docker compose up -d
#
# Developing from source? Use the test override, which builds locally:
#   docker compose -f compose.yaml -f compose.test.yaml up --build -d

services:
  app:
    image: ghcr.io/ztein/figmark:${FIGMARK_VERSION:-edge}
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Bound resources on the host (limits large-PDF memory blowups).
    mem_limit: 2g
    cpus: 2.0
    pids_limit: 256
    environment:
      # Secrets are read from files, not from these values.
      FIGMARK_AUTH_TOKEN_FILE: /run/secrets/figmark_auth_token
      FIGMARK_API_KEY_FILE: /run/secrets/figmark_api_key
      FIGMARK_CONFIG_PATH: /app/config.yaml
      FIGMARK_MAX_CONCURRENT_JOBS: "1"
    secrets:
      - figmark_auth_token
      - figmark_api_key
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).status==200 else 1)
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

secrets:
  figmark_auth_token:
    file: ./secrets/auth_token
  figmark_api_key:
    file: ./secrets/figmark_api_key
