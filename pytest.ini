[pytest]
testpaths = tests
markers =
    live: kör mot riktiga Berget-API:t (kräver BERGET_API_KEY, kostar pengar, tar minuter)
# Default-läge: kör ALLT inklusive live. Principen "kör på riktigt" gäller.
# För snabb iteration utan live: pytest -m "not live"
addopts = -ra --strict-markers
filterwarnings =
    ignore::DeprecationWarning:importlib._bootstrap
