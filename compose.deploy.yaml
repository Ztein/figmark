# Single-host deploy override: build the image FROM LOCAL SOURCE (instead of
# pulling GHCR) and run it against the real config.yaml. Use this on a host where
# you want a native-arch image built on the box (e.g. Apple Silicon, see T-046)
# rather than the published amd64 image.
#
#   docker compose -f compose.yaml -f compose.deploy.yaml up --build -d
#
# Deliberately changes NO ports: the canonical compose.yaml bind
# (127.0.0.1:8000:8000) is correct and is used as-is. To reach the service from
# another machine, put a proxy in front of loopback rather than widening the bind
# to 0.0.0.0 — e.g. a reverse proxy (nginx/Caddy) terminating TLS, or
# `tailscale serve` for a private tailnet. Widening the published bind exposes the
# host's whole network and is easy to do by accident; prefer the proxy.

services:
  app:
    image: figmark:local
    build:
      context: .
      args:
        VERSION: ${FIGMARK_VERSION:-0.0.0-source}
        REVISION: ${FIGMARK_REVISION:-local}
