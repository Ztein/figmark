# Automated dependency updates. Especially important here because everything is
# pinned (hash-locked Python deps, digest-pinned base images): pins go stale
# without automation. Dependabot PRs run the full CI + security gates.
version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /tests/mockllm
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      # codeql-action/init and codeql-action/analyze are separate update paths,
      # so ungrouped Dependabot files one PR each — and CodeQL fails the SARIF
      # upload whenever the two land on different versions. Group them so they
      # always move together in a single PR.
      codeql-action:
        patterns: ["github/codeql-action*"]
