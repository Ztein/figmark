# Automated dependency updates. Especially important here because everything is
# pinned (hash-locked Python deps, digest-pinned base images): pins go stale
# without automation. Dependabot PRs run the full CI + security gates.
version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /tests/mockllm
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
