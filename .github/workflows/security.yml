name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # New CVEs appear in EXISTING images/lockfiles — scan on a schedule, not just
  # on pushes. A scheduled failure auto-files an issue (see the alert job).
  schedule:
    - cron: "30 5 * * 1" # weekly, Monday 05:30 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Cheap static checks first — fail before the expensive build.
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Hadolint (Dockerfile lint)
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml

      - name: Trivy config scan (Dockerfile + compose misconfig)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Trivy secret scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          exit-code: "1"

      - name: pip-audit (Python dependency CVEs — hard gate)
        # A second, independent vulnerability source: pip-audit (OSV/PyPA) catches
        # advisories before Trivy's DB ingests them (proven by PYSEC-2026-161).
        run: |
          python -m pip install pip-audit
          pip-audit -r requirements.lock --disable-pip --strict

  # Build the image, run the hard vulnerability gate, produce an SBOM, and run the
  # Docker-gated runtime + offline compose end-to-end tests. Green main builds
  # are published to GHCR as :edge.
  image:
    needs: static
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build image
        run: |
          docker build \
            --build-arg VERSION="${GITHUB_REF_NAME}" \
            --build-arg REVISION="${GITHUB_SHA::8}" \
            -t figmark:ci .

      - name: Build Office image variant (T-054)
        run: |
          docker build --target runtime-office \
            --build-arg VERSION="${GITHUB_REF_NAME}" \
            --build-arg REVISION="${GITHUB_SHA::8}" \
            -t figmark-office:ci .

      - name: Trivy image scan (hard gate — fixable HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: figmark:ci
          scan-type: image
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: .trivyignore

      - name: Trivy Office-image scan (same hard gate — the LO layer must not breach it)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: figmark-office:ci
          scan-type: image
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: .trivyignore

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: figmark:ci
          format: spdx-json
          output-file: figmark-sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: figmark-sbom.spdx.json

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install dev deps (for the Docker-gated tests)
        run: pip install -e ".[dev]"

      - name: Docker-gated runtime + offline compose e2e
        run: pytest -m docker -p no:cacheprovider

      # Publish AFTER all gates: only scanned, fully-tested images reach GHCR.
      - name: Publish to GHCR (:edge — every green main build)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "$GH_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker tag figmark:ci "ghcr.io/$owner/figmark:edge"
          docker tag figmark:ci "ghcr.io/$owner/figmark:main-${GITHUB_SHA::8}"
          docker push "ghcr.io/$owner/figmark:edge"
          docker push "ghcr.io/$owner/figmark:main-${GITHUB_SHA::8}"
          docker tag figmark-office:ci "ghcr.io/$owner/figmark:edge-office"
          docker push "ghcr.io/$owner/figmark:edge-office"

  # Escalation: a failed SCHEDULED scan means a new vulnerability or drift was
  # found in the published state with no human at the keyboard. File (or update)
  # an issue so it is visible — nothing gets fixed silently or missed silently.
  alert:
    needs: [static, image]
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open or update the security-scan issue
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --label security-scan --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" \
              --body "Scheduled security scan failed again: $RUN_URL"
          else
            gh label create security-scan --repo "$GITHUB_REPOSITORY" \
              --color B60205 --description "Automated scheduled-scan failures" 2>/dev/null || true
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "Scheduled security scan failed" \
              --label security-scan \
              --body "The weekly security scan failed — a new CVE or config drift was likely found in the published state. Run: $RUN_URL"
          fi
