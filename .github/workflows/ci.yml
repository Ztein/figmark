name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Auto-merged bot commits don't trigger push workflows (GITHUB_TOKEN), so a
  # weekly run keeps main's checks and the badge honest.
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC
  workflow_dispatch:

jobs:
  # One macOS leg (single Python) so the CLI path many users actually run —
  # Apple Silicon + Homebrew Tesseract — is covered; the full version matrix
  # runs on Linux. Not a required check.
  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Tesseract (English + Swedish language packs)
        run: brew install tesseract tesseract-lang
      - name: Install package (with dev extras)
        run: pip install -e ".[dev]"
      - name: Run tests (offline)
        run: pytest -m "not live and not docker"

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Tesseract (English + Swedish language packs)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng tesseract-ocr-swe

      - name: Install package (with dev extras)
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Format check
        run: ruff format --check src tests

      - name: Type check
        run: mypy

      - name: Lockfile is up to date
        run: |
          pip install uv
          uv pip compile pyproject.toml --extra server --python-version 3.12 \
            --universal --generate-hashes -o requirements.lock
          git diff --exit-code requirements.lock

      - name: Run tests (offline; excludes live API + Docker-gated) with coverage gate
        # The floor is set just under the current level (91%) — it may only move up.
        run: pytest -m "not live and not docker" --cov=src/figmark --cov-report=term --cov-fail-under=88
