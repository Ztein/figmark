name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Tesseract (English + Swedish language packs)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng tesseract-ocr-swe

      - name: Install package (with dev extras)
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Format check
        run: ruff format --check src tests

      - name: Lockfile is up to date
        run: |
          pip install uv
          uv pip compile pyproject.toml --extra server --python-version 3.12 \
            --universal --generate-hashes -o requirements.lock
          git diff --exit-code requirements.lock

      - name: Run tests (offline; excludes live API + Docker-gated)
        run: pytest -m "not live and not docker"
