name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Auto-merged bot commits don't trigger push workflows (GITHUB_TOKEN), so a
  # weekly run keeps main's checks and the badge honest.
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC
  workflow_dispatch:

jobs:
  # One macOS leg (single Python) so the CLI path many users actually run —
  # Apple Silicon + Homebrew Tesseract — is covered; the full version matrix
  # runs on Linux. Not a required check.
  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Tesseract (English + Swedish language packs)
        run: brew install tesseract tesseract-lang
      - name: Install package (with dev extras)
        run: pip install -e ".[dev]"
      - name: Run tests (offline)
        run: pytest -m "not live and not docker"

  # The adversarial Office-input suite (T-054) needs a real LibreOffice, so it
  # runs in its own leg with the same minimal headless set the Office image
  # variant installs. The matrix legs skip these tests (no soffice there).
  test-office:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install LibreOffice (headless, no UI/Java) + Tesseract
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libreoffice-writer-nogui libreoffice-calc-nogui libreoffice-impress-nogui \
            fonts-dejavu-core fonts-liberation \
            tesseract-ocr tesseract-ocr-eng tesseract-ocr-swe
      - name: Install package (with dev extras)
        run: pip install -e ".[dev]"
      - name: Adversarial Office-input suite
        run: pytest -m office -ra

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Tesseract (English + Swedish language packs)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng tesseract-ocr-swe

      - name: Install package (with dev extras)
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Format check
        run: ruff format --check src tests

      - name: Type check
        run: mypy

      - name: Lockfile is up to date
        run: |
          pip install uv
          uv pip compile pyproject.toml --extra server --python-version 3.12 \
            --universal --generate-hashes -o requirements.lock
          git diff --exit-code requirements.lock

      - name: Run tests (offline; excludes live API + Docker-gated) with coverage gate
        # The floor is set just under the current level (91%) — it may only move up.
        run: pytest -m "not live and not docker" --cov=src/figmark --cov-report=term --cov-fail-under=88
