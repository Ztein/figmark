name: Release

# Build and publish to PyPI when a version tag is pushed (e.g. v0.1.0).
# Uses PyPI Trusted Publishing (OIDC) — no API token needed. Configure the
# project as a trusted publisher on PyPI before the first release.

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    # Skipped until PyPI Trusted Publishing is configured on pypi.org for this
    # project. Flip it on with a repository variable:
    #   gh variable set PYPI_PUBLISH --body true
    if: vars.PYPI_PUBLISH == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  # The air-gapped deliverable: a scanned image exported as a tarball + checksum,
  # bundled with the compose file, a sample config, and the deployment runbook.
  image-bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # attach assets to the GitHub Release
      packages: write  # publish the image to GHCR
      id-token: write  # keyless cosign signing via the GitHub OIDC token (T-016)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Compute version (tag without the v prefix)
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          docker build \
            --build-arg VERSION="${{ steps.ver.outputs.version }}" \
            --build-arg REVISION="${GITHUB_SHA::8}" \
            -t "figmark:${{ steps.ver.outputs.version }}" .

      - name: Trivy image gate (must pass before shipping)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: figmark:${{ steps.ver.outputs.version }}
          scan-type: image
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: .trivyignore

      - name: Publish to GHCR (versioned + latest)
        id: publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "$GH_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker tag "figmark:${VERSION}" "ghcr.io/$owner/figmark:${VERSION}"
          docker tag "figmark:${VERSION}" "ghcr.io/$owner/figmark:latest"
          docker push "ghcr.io/$owner/figmark:${VERSION}"
          docker push "ghcr.io/$owner/figmark:latest"
          # The immutable digest both tags now point at — sign/attest by digest,
          # not by mutable tag, so the signature can't be swapped under us. (T-016)
          digest=$(docker inspect --format='{{index .RepoDigests 0}}' "ghcr.io/$owner/figmark:${VERSION}")
          echo "image=$digest" >> "$GITHUB_OUTPUT"

      # --- Supply-chain provenance: keyless cosign signature + SBOM attestation (T-016) ---
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Generate SBOM (SPDX) for the image
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.publish.outputs.image }}
          format: spdx-json
          output-file: figmark.spdx.json

      - name: Sign the image and attest its SBOM (keyless)
        env:
          IMAGE: ${{ steps.publish.outputs.image }}
        run: |
          # Keyless: identity from the GitHub OIDC token, signature logged to the
          # public Rekor transparency log. No long-lived keys.
          cosign sign --yes "$IMAGE"
          cosign attest --yes --type spdxjson --predicate figmark.spdx.json "$IMAGE"

      - name: Export tarball + checksum + deploy bundle
        # Save under the GHCR name so `docker load` restores exactly the image
        # reference compose.yaml uses (with FIGMARK_VERSION=<ver>).
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          mkdir -p bundle
          docker save "ghcr.io/$owner/figmark:${VERSION}" | gzip > "bundle/figmark-${VERSION}.tar.gz"
          cp compose.yaml config.example.yaml docs/deployment.md bundle/
          cd bundle && sha256sum * > SHA256SUMS

      - name: Attach bundle to the release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: bundle/*
