name: Release

# Build and publish to PyPI when a version tag is pushed (e.g. v0.1.0).
# Uses PyPI Trusted Publishing (OIDC) — no API token needed. Configure the
# project as a trusted publisher on PyPI before the first release.

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    # Skipped until PyPI Trusted Publishing is configured on pypi.org for this
    # project. Flip it on with a repository variable:
    #   gh variable set PYPI_PUBLISH --body true
    if: vars.PYPI_PUBLISH == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  # The air-gapped deliverable: a scanned image exported as a tarball + checksum,
  # bundled with the compose file, a sample config, and the deployment runbook.
  image-bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # attach assets to the GitHub Release
      packages: write  # publish the image to GHCR
      id-token: write  # keyless cosign signing via the GitHub OIDC token (T-016)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Compute version (tag without the v prefix)
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Multi-arch (T-046): the arm64 leg builds under QEMU on the amd64 runner;
      # buildx assembles both legs into a single manifest list on push.
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build image (amd64, loaded locally) for the Trivy gate
        # The gate scans before anything is pushed. Vulnerabilities are in the
        # apt/pip layers, which are identical across arches, so scanning the
        # amd64 leg gates both. The layer cache is shared with the push below.
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --build-arg VERSION="${{ steps.ver.outputs.version }}" \
            --build-arg REVISION="${GITHUB_SHA::8}" \
            --load -t "figmark:${{ steps.ver.outputs.version }}" .

      - name: Trivy image gate (must pass before shipping)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: figmark:${{ steps.ver.outputs.version }}
          scan-type: image
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: .trivyignore

      - name: Build Office image variant (amd64, loaded locally) for its gate (T-054)
        run: |
          docker buildx build \
            --target runtime-office \
            --platform linux/amd64 \
            --build-arg VERSION="${{ steps.ver.outputs.version }}" \
            --build-arg REVISION="${GITHUB_SHA::8}" \
            --load -t "figmark-office:${{ steps.ver.outputs.version }}" .

      - name: Trivy Office-image gate (the LO layer must not breach the posture)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: figmark-office:${{ steps.ver.outputs.version }}
          scan-type: image
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: .trivyignore

      - name: Publish multi-arch manifest to GHCR (versioned + latest)
        id: publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "$GH_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg VERSION="${VERSION}" \
            --build-arg REVISION="${GITHUB_SHA::8}" \
            -t "ghcr.io/$owner/figmark:${VERSION}" \
            -t "ghcr.io/$owner/figmark:latest" \
            --push \
            --metadata-file buildx-meta.json .
          # The immutable manifest-list digest both tags now point at — sign/attest
          # by digest, not by mutable tag, so the signature can't be swapped under
          # us. (T-016)
          digest=$(jq -r '."containerimage.digest"' buildx-meta.json)
          echo "owner=$owner" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/$owner/figmark@$digest" >> "$GITHUB_OUTPUT"
          # Office variant (T-054): same multi-arch publish under -office tags.
          docker buildx build \
            --target runtime-office \
            --platform linux/amd64,linux/arm64 \
            --build-arg VERSION="${VERSION}" \
            --build-arg REVISION="${GITHUB_SHA::8}" \
            -t "ghcr.io/$owner/figmark:${VERSION}-office" \
            -t "ghcr.io/$owner/figmark:latest-office" \
            --push \
            --metadata-file buildx-meta-office.json .
          office_digest=$(jq -r '."containerimage.digest"' buildx-meta-office.json)
          echo "office_image=ghcr.io/$owner/figmark@$office_digest" >> "$GITHUB_OUTPUT"

      - name: Verify the manifests list both architectures
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          for tag in "${VERSION}" "${VERSION}-office"; do
            ref="ghcr.io/${{ steps.publish.outputs.owner }}/figmark:$tag"
            for platform in linux/amd64 linux/arm64; do
              docker buildx imagetools inspect "$ref" | grep -q "$platform" \
                || { echo "::error::$ref is missing the $platform leg"; exit 1; }
            done
          done

      # --- Supply-chain provenance: keyless cosign signature + SBOM attestation (T-016) ---
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Generate SBOM (SPDX) for the image
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.publish.outputs.image }}
          format: spdx-json
          output-file: figmark.spdx.json

      - name: Sign the image and attest its SBOM (keyless)
        env:
          IMAGE: ${{ steps.publish.outputs.image }}
        run: |
          # Keyless: identity from the GitHub OIDC token, signature logged to the
          # public Rekor transparency log. No long-lived keys.
          cosign sign --yes "$IMAGE"
          cosign attest --yes --type spdxjson --predicate figmark.spdx.json "$IMAGE"

      - name: Generate SBOM (SPDX) for the Office image
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.publish.outputs.office_image }}
          format: spdx-json
          output-file: figmark-office.spdx.json

      - name: Sign the Office image and attest its SBOM (keyless)
        env:
          IMAGE: ${{ steps.publish.outputs.office_image }}
        run: |
          cosign sign --yes "$IMAGE"
          cosign attest --yes --type spdxjson --predicate figmark-office.spdx.json "$IMAGE"

      - name: Export tarballs (one per arch) + checksum + deploy bundle
        # Save under the GHCR name so `docker load` restores exactly the image
        # reference compose.yaml uses (with FIGMARK_VERSION=<ver>). Each arch gets
        # its own tarball — `docker save` can't export a manifest list, and the
        # air-gapped host loads exactly one arch anyway. Pulling back what we just
        # pushed also proves the registry serves both legs. The amd64 tarball
        # keeps its historical name so existing runbooks stay valid.
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          owner="${{ steps.publish.outputs.owner }}"
          mkdir -p bundle
          docker pull --platform linux/amd64 "ghcr.io/$owner/figmark:${VERSION}"
          docker save "ghcr.io/$owner/figmark:${VERSION}" | gzip > "bundle/figmark-${VERSION}.tar.gz"
          docker pull --platform linux/arm64 "ghcr.io/$owner/figmark:${VERSION}"
          docker save "ghcr.io/$owner/figmark:${VERSION}" | gzip > "bundle/figmark-${VERSION}-arm64.tar.gz"
          cp compose.yaml config.example.yaml docs/deployment.md bundle/
          cd bundle && sha256sum * > SHA256SUMS

      - name: Attach bundle to the release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: bundle/*
