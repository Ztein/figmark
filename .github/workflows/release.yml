name: Release

# Build and publish to PyPI when a version tag is pushed (e.g. v0.1.0).
# Uses PyPI Trusted Publishing (OIDC) — no API token needed. Configure the
# project as a trusted publisher on PyPI before the first release.

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # The air-gapped deliverable: a scanned image exported as a tarball + checksum,
  # bundled with the compose file, a sample config, and the deployment runbook.
  image-bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # attach assets to the GitHub Release
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          docker build \
            --build-arg VERSION="${VERSION}" \
            --build-arg REVISION="${GITHUB_SHA::8}" \
            -t "figmark:${VERSION}" .

      - name: Trivy image gate (must pass before shipping)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: figmark:${{ github.ref_name }}
          scan-type: image
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: .trivyignore

      - name: Export tarball + checksum + deploy bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p bundle
          docker save "figmark:${VERSION}" | gzip > "bundle/figmark-${VERSION}.tar.gz"
          cp compose.yaml config.yaml docs/deployment.md bundle/
          cd bundle && sha256sum * > SHA256SUMS

      - name: Attach bundle to the release
        uses: softprops/action-gh-release@v2
        with:
          files: bundle/*
