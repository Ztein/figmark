name: Dependabot auto-merge

# Zero-touch dependency maintenance — for BOTS only. Branch protection requires
# one approving review plus all status checks; this workflow approves and arms
# auto-merge on Dependabot's PRs, so they merge themselves when every gate (CI
# matrix, Security static+image, CodeQL) is green. Human PRs are untouched: they
# still need a maintainer's review. Red bot PRs stay open as the visible
# escalation. Majors are included by design — the gates are the review.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Approve the PR (satisfies the required review for bots)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr review --approve "$PR_URL"

      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
